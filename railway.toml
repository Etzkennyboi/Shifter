[build]
builder = "nixpacks"
buildCommand = "npm install && curl -fsSL https://raw.githubusercontent.com/okx/onchainos-skills/main/install.sh | bash && mkdir -p ./bin && cp $HOME/.local/bin/onchainos ./bin/onchainos && chmod +x ./bin/onchainos && DATABASE_URL=\"file:./dev.db\" npx prisma generate && DATABASE_URL=\"file:./dev.db\" npm run build"

[deploy]
startCommand = "export DATABASE_URL=${DATABASE_URL:-file:./prisma/dev.db} && npx prisma db push --accept-data-loss && node scripts/seed-tasks.js && npm start"
healthcheckPath = "/"
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 3

[service]
internalPort = 3000

[build.env]
DATABASE_URL = "file:./prisma/dev.db"
