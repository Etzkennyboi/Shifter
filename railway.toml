[build]
builder = "nixpacks"
buildCommand = "npm install && npx prisma generate && npm run build"

[deploy]
startCommand = "export DATABASE_URL=${DATABASE_URL:-file:./prisma/dev.db} && npx prisma db push --accept-data-loss && node scripts/seed-tasks.js && npm start"
healthcheckPath = "/"
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 3

[service]
internalPort = 3000

[build.env]
DATABASE_URL = "file:./prisma/dev.db"
