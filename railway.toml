[build]
builder = "nixpacks"
buildCommand = "npm install && npx prisma generate && npx prisma db push && node scripts/seed-tasks.js && npm run build"

[deploy]
startCommand = "npm start"
healthcheckPath = "/"
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 3

[service]
internalPort = 3000
